<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      margin: 0; min-height: 100vh; display: grid; place-items: center;
      color: #f7f0df; background: #111827; font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
    }
    main { max-width: 720px; padding: 48px; text-align: center; }
    p:first-child { color: #d68c6c; font-size: 13px; font-weight: 800; letter-spacing: 3px; }
    h1 { font-size: 56px; margin: 18px 0; }
    .body { color: #c8cbd1; font-size: 19px; line-height: 1.7; }
    .escape { margin-top: 50px; color: #858b96; font-size: 13px; }
    kbd { border: 1px solid #6c7280; border-radius: 5px; padding: 3px 7px; }
  </style>
</head>
<body>
  <main>
    <p>20 秒复位</p>
    <h1>停一下。你已经偏航了。</h1>
    <p class="body">不用骂自己，也不用跟冲动辩论。呼吸，想清楚下一步，窗口会自动关闭，然后只做那一步。</p>
    <p class="escape">紧急退出：<kbd>Ctrl</kbd> + <kbd>Shift</kbd> + <kbd>F12</kbd></p>
  </main>
</body>
</html>
